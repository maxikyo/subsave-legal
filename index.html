<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SubSave - Legal</title>
  <style>
    :root {
      --ice-blue: #7DD3FC;
      --dark-bg: #0F172A;
      --card-bg: #1E293B;
      --text-primary: #F1F5F9;
      --text-secondary: #94A3B8;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--dark-bg);
      color: var(--text-primary);
      line-height: 1.7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .container {
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    h1 {
      color: var(--ice-blue);
      font-size: 2rem;
      margin-bottom: 8px;
    }
    .subtitle {
      color: var(--text-secondary);
      margin-bottom: 32px;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    a {
      display: block;
      background: var(--card-bg);
      color: var(--text-primary);
      text-decoration: none;
      padding: 16px 24px;
      border-radius: 12px;
      font-size: 1.1rem;
      transition: background 0.2s;
    }
    a:hover {
      background: #334155;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>SubSave</h1>
    <p class="subtitle">Subscription tracker for iOS & Android</p>
    <div class="links">
      <a href="privacy.html">Privacy Policy</a>
      <a href="terms.html">Terms of Use</a>
    </div>
  </div>
</body>
</html>
